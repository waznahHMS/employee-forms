<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindBridge - Employee Forms</title>

    <!-- Tabler Icons (open-source, no attribution required) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css" />

    <style>
        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #EFF3F9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ── Card ── */
        .container {
            max-width: 560px;
            width: 100%;
            background: #FFFFFF;
            border-radius: 32px;
            padding: 48px 40px 40px;
            box-shadow: 0 20px 60px rgba(44, 50, 62, 0.10);
            text-align: center;
            transition: transform 0.2s ease;
        }

        /* ── Logo ── */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: #B39AE4;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 22px;
            color: #FFFFFF;
            letter-spacing: -0.5px;
        }

        .logo-text {
            font-size: 26px;
            font-weight: 700;
            color: #2C323E;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: #B39AE4;
        }

        .tagline {
            color: #6B7280;
            font-size: 14px;
            font-weight: 400;
            margin-top: -4px;
            margin-bottom: 32px;
            letter-spacing: 0.2px;
        }

        /* ── Heading ── */
        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #2C323E;
            margin-bottom: 6px;
        }

        .sub-heading {
            font-size: 15px;
            color: #6B7280;
            margin-bottom: 32px;
        }

        /* ── Buttons ── */
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .form-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #F8FAFD;
            border-radius: 16px;
            padding: 18px 22px;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .form-card:hover {
            background: #FFFFFF;
            border-color: #B39AE4;
            box-shadow: 0 8px 24px rgba(179, 154, 228, 0.20);
            transform: translateY(-2px);
        }

        .form-card:active {
            transform: scale(0.97);
        }

        .form-card-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .form-icon {
            width: 44px;
            height: 44px;
            background: #B39AE4;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #FFFFFF;
            flex-shrink: 0;
        }

        .form-icon i {
            font-size: 22px;
        }

        .form-info {
            text-align: left;
        }

        .form-title {
            font-size: 16px;
            font-weight: 600;
            color: #2C323E;
        }

        .form-desc {
            font-size: 13px;
            color: #6B7280;
            margin-top: 2px;
        }

        .arrow {
            color: #B39AE4;
            font-size: 20px;
            font-weight: 300;
            transition: transform 0.2s ease;
        }

        .form-card:hover .arrow {
            transform: translateX(4px);
        }

        /* ── Footer ── */
        .footer {
            font-size: 13px;
            color: #9CA3AF;
            border-top: 1px solid #EFF3F9;
            padding-top: 22px;
            margin-top: 4px;
        }

        .footer a {
            color: #B39AE4;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .container {
                padding: 32px 20px 28px;
                border-radius: 24px;
            }

            .logo-text {
                font-size: 22px;
            }

            .form-card {
                padding: 14px 16px;
                flex-wrap: wrap;
            }

            .form-title {
                font-size: 15px;
            }

            .form-desc {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Logo -->
        <div class="logo">
            <div class="logo-icon">MB</div>
            <div class="logo-text">Mind<span>Bridge</span></div>
        </div>
        <div class="tagline">The Bridge to Better</div>

        <!-- Heading -->
        <h1>Employee Forms</h1>
        <p class="sub-heading">Select a form to get started</p>

        <!-- Form Links -->
        <div class="form-grid">

            <!-- Leave Form -->
            <a href="https://tally.so/r/81WxGk" target="_blank" class="form-card" id="leaveLink">
                <div class="form-card-left">
                    <div class="form-icon"><i class="ti ti-calendar-check"></i></div>
                    <div class="form-info">
                        <div class="form-title">Leave Request</div>
                        <div class="form-desc">Annual &bull; Sick &bull; Personal</div>
                    </div>
                </div>
                <span class="arrow">→</span>
            </a>

            <!-- Monthly Contribution Form (NEW) -->
            <a href="https://tally.so/r/rjpP4p" target="_blank" class="form-card" id="contributionLink">
                <div class="form-card-left">
                    <div class="form-icon"><i class="ti ti-coin"></i></div>
                    <div class="form-info">
                        <div class="form-title">Monthly Contribution</div>
                        <div class="form-desc">SSS &bull; Pag-IBIG &bull; PhilHealth</div>
                    </div>
                </div>
                <span class="arrow">→</span>
            </a>

            <!-- Reimbursement Form -->
            <a href="https://tally.so/r/EkgWL2" target="_blank" class="form-card" id="reimburseLink">
                <div class="form-card-left">
                    <div class="form-icon"><i class="ti ti-receipt-2"></i></div>
                    <div class="form-info">
                        <div class="form-title">Office Reimbursement</div>
                        <div class="form-desc">Supplies &bull; Printing &bull; Expenses</div>
                    </div>
                </div>
                <span class="arrow">→</span>
            </a>

        </div>

        <!-- Footer -->
        <div class="footer">
            &copy; 2026 MindBridge &bull; 
            <a href="#" onclick="showAlert(); return false;">Need help?</a>
        </div>

    </div>

    <script>
        /**
         * Click tracking for all three forms
         */
        document.getElementById('leaveLink').addEventListener('click', function(e) {
            console.log('[MindBridge] Leave Form clicked at ' + new Date().toLocaleString());
        });

        document.getElementById('contributionLink').addEventListener('click', function(e) {
            console.log('[MindBridge] Monthly Contribution Form clicked at ' + new Date().toLocaleString());
        });

        document.getElementById('reimburseLink').addEventListener('click', function(e) {
            console.log('[MindBridge] Reimbursement Form clicked at ' + new Date().toLocaleString());
        });

        /**
         * Help alert — replace with real support link
         */
        function showAlert() {
            alert('📧 For assistance, please contact HR at hr@mindbridge.com');
        }

        /**
         * Mobile detection
         */
        if (window.innerWidth < 600) {
            console.log('[MindBridge] Mobile viewport detected');
        }

        /**
         * Smooth page load animation
         */
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            container.style.transition = 'opacity 0.5s ease, transform 0.5s ease';

            setTimeout(() => {
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>

</body>
</html>
